[supervisord]
nodaemon=true
logfile=/data/logs/supervisord.log
pidfile=/tmp/supervisord.pid
childlogdir=/data/logs

# ── Virtual framebuffer ──────────────────────────────────────────────────────
[program:xvfb]
command=/usr/bin/Xvfb :99 -screen 0 %(ENV_RESOLUTION)s -ac +extension GLX +render -noreset
autorestart=true
priority=10
stdout_logfile=/data/logs/xvfb.log
stderr_logfile=/data/logs/xvfb-err.log

# ── Lightweight window manager ───────────────────────────────────────────────
[program:fluxbox]
command=/usr/bin/fluxbox
environment=DISPLAY=":99"
user=ltx
autorestart=true
priority=20
startsecs=3
stdout_logfile=/data/logs/fluxbox.log
stderr_logfile=/data/logs/fluxbox-err.log

# ── VNC server (set VNC_PASSWORD env var to secure, otherwise no auth) ───────
[program:x11vnc]
command=bash -c 'sleep 2 && x11vnc -display :99 -forever -shared -rfbport 5900 -xkb ${VNC_PASSWORD:+-passwd "$VNC_PASSWORD"} ${VNC_PASSWORD:--nopw}'
autorestart=true
priority=30
stdout_logfile=/data/logs/x11vnc.log
stderr_logfile=/data/logs/x11vnc-err.log

# ── noVNC websocket proxy (browser access on port 6080) ─────────────────────
[program:novnc]
command=bash -c 'sleep 3 && websockify --web /usr/share/novnc 6080 localhost:5900'
autorestart=true
priority=40
stdout_logfile=/data/logs/novnc.log
stderr_logfile=/data/logs/novnc-err.log

# ── LTX Desktop Electron app (runs as non-root ltx user) ────────────────────
# XDG_DATA_HOME=/data tells Electron to store app data at /data/LTXDesktop
# (models, settings, outputs). This is what gets persisted via the volume.
[program:ltx-desktop]
command=bash -c 'sleep 4 && cd /app && pnpm dev'
environment=DISPLAY=":99",HOME="/home/ltx",XDG_DATA_HOME="/data"
user=ltx
autorestart=true
priority=50
startsecs=10
stdout_logfile=/data/logs/ltx-desktop.log
stderr_logfile=/data/logs/ltx-desktop-err.log
